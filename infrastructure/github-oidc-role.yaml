AWSTemplateFormatVersion: "2010-09-09"
Description: GitHub Actions OIDC deploy role for DeckHub.

Parameters:
  GitHubOrg:
    Type: String
    Default: Enceladus-X
  RepositoryName:
    Type: String
    Default: deckhub
  BranchName:
    Type: String
    Default: main
  SamStackName:
    Type: String
    Default: deckhub
    AllowedPattern: "^[a-z0-9-]+$"
  RoleName:
    Type: String
    Default: deckhub-github-actions-deploy
  CreateOidcProvider:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"

Conditions:
  ShouldCreateOidcProvider: !Equals [!Ref CreateOidcProvider, "true"]

Resources:
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: ShouldCreateOidcProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      Tags:
        - Key: Project
          Value: DeckHub

  SamArtifactsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "${SamStackName}-sam-artifacts-${AWS::AccountId}-${AWS::Region}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldSamArtifacts
            Status: Enabled
            ExpirationInDays: 30

  GitHubActionsDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - ShouldCreateOidcProvider
                - !Ref GitHubOidcProvider
                - !Sub "arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com"
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}/${RepositoryName}:ref:refs/heads/${BranchName}"
      Policies:
        - PolicyName: DeckHubDeployPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: CloudFormationSamDeploy
                Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                  - cloudformation:CreateStack
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStackResource
                  - cloudformation:DescribeStackResources
                  - cloudformation:DescribeStacks
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:GetTemplate
                  - cloudformation:GetTemplateSummary
                  - cloudformation:ListStackResources
                  - cloudformation:TagResource
                  - cloudformation:UpdateStack
                  - cloudformation:ValidateTemplate
                Resource:
                  - !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${SamStackName}/*"
                  - !Sub "arn:aws:cloudformation:${AWS::Region}:aws:transform/Serverless-2016-10-31"

              - Sid: SamArtifactBucketAccess
                Effect: Allow
                Action:
                  - s3:DeleteObject
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:PutObject
                Resource:
                  - !GetAtt SamArtifactsBucket.Arn
                  - !Sub "${SamArtifactsBucket.Arn}/*"

              - Sid: StackS3BucketsAndFrontendSync
                Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:DeleteBucketPolicy
                  - s3:DeleteObject
                  - s3:GetBucketLocation
                  - s3:GetBucketPolicy
                  - s3:GetBucketPublicAccessBlock
                  - s3:GetBucketTagging
                  - s3:GetObject
                  - s3:GetEncryptionConfiguration
                  - s3:ListBucket
                  - s3:PutBucketPolicy
                  - s3:PutBucketPublicAccessBlock
                  - s3:PutBucketTagging
                  - s3:PutBucketVersioning
                  - s3:PutBucketEncryption
                  - s3:PutEncryptionConfiguration
                  - s3:PutLifecycleConfiguration
                  - s3:PutObject
                Resource:
                  - !Sub "arn:aws:s3:::${SamStackName}-*"
                  - !Sub "arn:aws:s3:::${SamStackName}-*/*"

              - Sid: LambdaDeploy
                Effect: Allow
                Action:
                  - lambda:AddPermission
                  - lambda:CreateFunction
                  - lambda:DeleteFunction
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:ListTags
                  - lambda:RemovePermission
                  - lambda:TagResource
                  - lambda:UntagResource
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${SamStackName}-*"

              - Sid: IamForSamGeneratedRoles
                Effect: Allow
                Action:
                  - iam:AttachRolePolicy
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:DeleteRolePolicy
                  - iam:DetachRolePolicy
                  - iam:GetRole
                  - iam:GetRolePolicy
                  - iam:PassRole
                  - iam:PutRolePolicy
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:UpdateAssumeRolePolicy
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/${SamStackName}-*"

              - Sid: ApiGatewayDeploy
                Effect: Allow
                Action:
                  - apigateway:DELETE
                  - apigateway:GET
                  - apigateway:PATCH
                  - apigateway:POST
                  - apigateway:PUT
                  - apigateway:TagResource
                  - apigateway:UntagResource
                Resource:
                  - !Sub "arn:aws:apigateway:${AWS::Region}::/apis"
                  - !Sub "arn:aws:apigateway:${AWS::Region}::/apis/*"
                  - !Sub "arn:aws:apigateway:${AWS::Region}::/v2/*"
                  - !Sub "arn:aws:apigateway:${AWS::Region}::/tags/*"

              - Sid: DynamoDbDeploy
                Effect: Allow
                Action:
                  - dynamodb:CreateTable
                  - dynamodb:DeleteTable
                  - dynamodb:DescribeContinuousBackups
                  - dynamodb:DescribeTable
                  - dynamodb:DescribeTimeToLive
                  - dynamodb:ListTagsOfResource
                  - dynamodb:TagResource
                  - dynamodb:UntagResource
                  - dynamodb:UpdateContinuousBackups
                  - dynamodb:UpdateTable
                  - dynamodb:UpdateTimeToLive
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${SamStackName}-*"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${SamStackName}-*/index/*"

              - Sid: CloudFrontDeployAndInvalidate
                Effect: Allow
                Action:
                  - cloudfront:CreateDistribution
                  - cloudfront:CreateInvalidation
                  - cloudfront:CreateOriginAccessControl
                  - cloudfront:DeleteDistribution
                  - cloudfront:DeleteOriginAccessControl
                  - cloudfront:GetDistribution
                  - cloudfront:GetDistributionConfig
                  - cloudfront:GetInvalidation
                  - cloudfront:GetOriginAccessControl
                  - cloudfront:GetOriginAccessControlConfig
                  - cloudfront:ListDistributions
                  - cloudfront:ListInvalidations
                  - cloudfront:TagResource
                  - cloudfront:UntagResource
                  - cloudfront:UpdateDistribution
                  - cloudfront:UpdateOriginAccessControl
                Resource: "*"

              - Sid: CloudWatchLogsDeploy
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:DeleteLogGroup
                  - logs:DescribeLogGroups
                  - logs:PutRetentionPolicy
                  - logs:TagResource
                  - logs:UntagResource
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${SamStackName}-*"

Outputs:
  DeployRoleArn:
    Value: !GetAtt GitHubActionsDeployRole.Arn
  SamArtifactBucketName:
    Value: !Ref SamArtifactsBucket
  GitHubSubject:
    Value: !Sub "repo:${GitHubOrg}/${RepositoryName}:ref:refs/heads/${BranchName}"
