name: deploy

on:
  push:
    branches:
      - main
  pull_request:

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
  SAM_STACK_NAME: ${{ vars.SAM_STACK_NAME || 'deckhub' }}
  STAGE_NAME: ${{ vars.STAGE_NAME || 'prod' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend:
    name: Backend and infrastructure
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      can_deploy: ${{ steps.deploy_config.outputs.can_deploy }}
      api_url: ${{ steps.outputs.outputs.api_url }}
      frontend_bucket: ${{ steps.outputs.outputs.frontend_bucket }}
      frontend_distribution_id: ${{ steps.outputs.outputs.frontend_distribution_id }}
      frontend_distribution_domain: ${{ steps.outputs.outputs.frontend_distribution_domain }}
      deck_files_bucket: ${{ steps.outputs.outputs.deck_files_bucket }}
      deck_files_distribution_domain: ${{ steps.outputs.outputs.deck_files_distribution_domain }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-dev.txt

      - name: Test backend
        run: python -m pytest backend

      - uses: aws-actions/setup-sam@v2

      - name: Validate SAM template
        run: sam validate --template-file infrastructure/template.yaml

      - name: Detect deploy configuration
        id: deploy_config
        env:
          AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          SAM_ARTIFACT_BUCKET: ${{ secrets.SAM_ARTIFACT_BUCKET }}
          CLOUDFRONT_KEY_GROUP_ID: ${{ secrets.CLOUDFRONT_KEY_GROUP_ID }}
          CLOUDFRONT_KEY_PAIR_ID: ${{ secrets.CLOUDFRONT_KEY_PAIR_ID }}
          CLOUDFRONT_PRIVATE_KEY_SECRET_ARN: ${{ secrets.CLOUDFRONT_PRIVATE_KEY_SECRET_ARN }}
        run: |
          if [ -n "$AWS_DEPLOY_ROLE_ARN" ] && \
             [ -n "$SAM_ARTIFACT_BUCKET" ] && \
             [ -n "$CLOUDFRONT_KEY_GROUP_ID" ] && \
             [ -n "$CLOUDFRONT_KEY_PAIR_ID" ] && \
             [ -n "$CLOUDFRONT_PRIVATE_KEY_SECRET_ARN" ]; then
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
            echo "::notice::AWS deployment secrets are not configured yet. Validation passed; deployment was skipped."
          fi

      - name: Configure AWS credentials
        if: github.event_name == 'push' && steps.deploy_config.outputs.can_deploy == 'true'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: deckhub-${{ github.run_id }}
          mask-aws-account-id: true

      - name: Build SAM application
        if: github.event_name == 'push' && steps.deploy_config.outputs.can_deploy == 'true'
        run: sam build --template-file infrastructure/template.yaml

      - name: Deploy SAM application
        if: github.event_name == 'push' && steps.deploy_config.outputs.can_deploy == 'true'
        env:
          SAM_ARTIFACT_BUCKET: ${{ secrets.SAM_ARTIFACT_BUCKET }}
          CLOUDFRONT_KEY_GROUP_ID: ${{ secrets.CLOUDFRONT_KEY_GROUP_ID }}
          CLOUDFRONT_KEY_PAIR_ID: ${{ secrets.CLOUDFRONT_KEY_PAIR_ID }}
          CLOUDFRONT_PRIVATE_KEY_SECRET_ARN: ${{ secrets.CLOUDFRONT_PRIVATE_KEY_SECRET_ARN }}
        run: |
          sam deploy \
            --template-file .aws-sam/build/template.yaml \
            --stack-name "$SAM_STACK_NAME" \
            --region "$AWS_REGION" \
            --s3-bucket "$SAM_ARTIFACT_BUCKET" \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              StageName="$STAGE_NAME" \
              CloudFrontTrustedKeyGroupId="$CLOUDFRONT_KEY_GROUP_ID" \
              CloudFrontKeyPairId="$CLOUDFRONT_KEY_PAIR_ID" \
              CloudFrontPrivateKeySecretArn="$CLOUDFRONT_PRIVATE_KEY_SECRET_ARN"

      - name: Read stack outputs
        if: github.event_name == 'push' && steps.deploy_config.outputs.can_deploy == 'true'
        id: outputs
        run: |
          outputs="$(aws cloudformation describe-stacks \
            --stack-name "$SAM_STACK_NAME" \
            --region "$AWS_REGION" \
            --query 'Stacks[0].Outputs' \
            --output json)"

          get_output() {
            jq -r --arg key "$1" '.[] | select(.OutputKey == $key) | .OutputValue' <<< "$outputs"
          }

          echo "api_url=$(get_output ApiUrl)" >> "$GITHUB_OUTPUT"
          echo "frontend_bucket=$(get_output FrontendBucketName)" >> "$GITHUB_OUTPUT"
          echo "frontend_distribution_id=$(get_output FrontendDistributionId)" >> "$GITHUB_OUTPUT"
          echo "frontend_distribution_domain=$(get_output FrontendDistributionDomain)" >> "$GITHUB_OUTPUT"
          echo "deck_files_bucket=$(get_output DeckFilesBucketName)" >> "$GITHUB_OUTPUT"
          echo "deck_files_distribution_domain=$(get_output DeckFilesDistributionDomain)" >> "$GITHUB_OUTPUT"

  frontend:
    name: Frontend static export
    needs: backend
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && needs.backend.outputs.can_deploy == 'true'
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build static export
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ needs.backend.outputs.api_url }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: deckhub-frontend-${{ github.run_id }}
          mask-aws-account-id: true

      - name: Upload static export to S3
        run: aws s3 sync out s3://${{ needs.backend.outputs.frontend_bucket }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ needs.backend.outputs.frontend_distribution_id }}" \
            --paths "/*"
