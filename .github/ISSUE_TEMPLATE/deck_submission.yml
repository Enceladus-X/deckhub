name: Deck submission
description: Share an Anki APKG deck with DeckHub.
title: "[Deck]: "
labels: ["deck-submission"]
body:
  - type: markdown
    attributes:
      value: |
        고맙습니다. APKG 파일은 이슈에 직접 첨부하지 말고, GitHub Release 또는 접근 가능한 링크로 공유해주세요.
        관리자가 검토 후 `decks/<category>/<slug>/deck.json` manifest로 옮깁니다.
  - type: input
    id: deck-title
    attributes:
      label: Deck title
      description: 사용자에게 보일 덱 이름입니다.
      placeholder: HSK 1~3급 600단어 예문
    validations:
      required: true
  - type: input
    id: exam-name
    attributes:
      label: Exam or subject
      description: 시험명, 과목명, 커리큘럼명을 적어주세요.
      placeholder: HSK
    validations:
      required: true
  - type: input
    id: category
    attributes:
      label: Category
      description: language, it, electrical, civil, safety처럼 넓은 분류를 적어주세요.
      placeholder: language
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: 급수, 점수대, 파트, 단원 등 필요한 범위를 자유롭게 적어주세요.
      placeholder: |
        - 1급
        - 2급
        - 3급
    validations:
      required: true
  - type: input
    id: download-url
    attributes:
      label: APKG download URL
      description: GitHub Release asset URL을 권장합니다.
      placeholder: https://github.com/Enceladus-X/deckhub/releases/download/tag/deck.apkg
    validations:
      required: true
  - type: input
    id: sha256
    attributes:
      label: SHA256
      description: Windows PowerShell에서는 `Get-FileHash .\deck.apkg -Algorithm SHA256`로 확인할 수 있습니다.
      placeholder: 64-character sha256 digest
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: 출처, 라이선스, 저작권 주의사항, 변경 내역, 분할 파일 정보가 있으면 적어주세요.
    validations:
      required: false
